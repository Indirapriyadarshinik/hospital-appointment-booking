<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef5ff;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#0d6efd;
padding-top:25px;
}

.sidebar h3{
color:#fff;
text-align:center;
margin-bottom:35px;
font-weight:600;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:rgba(255,255,255,.18);
}

.sidebar i{
margin-right:10px;
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
background:#fff;
padding:18px 25px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

.form-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.form-title{
font-weight:700;
color:#0d6efd;
margin-bottom:25px;
}

.form-control,
.form-select{
height:50px;
border-radius:10px;
}

textarea.form-control{
height:auto;
resize:none;
}

label{
font-weight:500;
margin-bottom:8px;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.main{
margin-left:0;
padding:15px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h3>

<i class="bi bi-hospital-fill"></i>

MedCare

</h3>

<a href="dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

<a href="appointment.html" class="active">

<i class="bi bi-calendar-plus"></i>

Book Appointment

</a>

<a href="appointments.html">

<i class="bi bi-calendar-check"></i>

My Appointments

</a>

<a href="profile.html">

<i class="bi bi-person-circle"></i>

Profile

</a>

<a href="../login.html">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h4>

Book Appointment

</h4>

<div>

<i class="bi bi-person-circle"></i>

Welcome,

<b id="patientName">

Patient

</b>

</div>

</div>

<div class="form-card">

<h3 class="form-title">

<i class="bi bi-calendar-plus-fill"></i>

Book New Appointment

</h3>

<form id="appointmentForm">

<div class="row">

<!-- Doctor -->

<div class="col-md-6 mb-3">

<label>

Doctor

</label>

<select
id="doctor"
class="form-select"
required>

<option value="">

Select Doctor

</option>

<option value="DR001">

Dr. Rahul Sharma

</option>

<option value="DR002">

Dr. Priya Reddy

</option>

<option value="DR003">

Dr. Naveen Kumar

</option>

<option value="DR004">

Dr. Arjun Kumar

</option>

</select>

</div>

<!-- Department -->

<div class="col-md-6 mb-3">

<label>

Department

</label>

<input
type="text"
id="department"
class="form-control"
readonly>

</div>

<!-- Date -->

<div class="col-md-6 mb-3">

<label>

Appointment Date

</label>

<input
type="date"
id="appointmentDate"
class="form-control"
required>

</div>

<!-- Time -->

<div class="col-md-6 mb-3">

<label>

Appointment Time

</label>

<select
id="appointmentTime"
class="form-select"
required>

<option value="">

Select Time

</option>

<option>09:00 AM</option>

<option>10:00 AM</option>

<option>11:00 AM</option>

<option>02:00 PM</option>

<option>03:00 PM</option>

<option>04:00 PM</option>

</select>

</div>
<!-- Blood Group -->

<div class="col-md-6 mb-3">

<label>

Blood Group

</label>

<select
id="bloodGroup"
class="form-select">

<option value="">Select Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

<!-- Emergency Contact -->

<div class="col-md-6 mb-3">

<label>

Emergency Contact

</label>

<input
type="tel"
id="emergencyContact"
class="form-control"
placeholder="Enter Emergency Contact"
required>

</div>

<!-- Symptoms -->

<div class="col-12 mb-3">

<label>

Symptoms / Reason for Visit

</label>

<textarea
id="symptoms"
class="form-control"
rows="4"
placeholder="Describe your symptoms..."
required></textarea>

</div>

<!-- Medical History -->

<div class="col-12 mb-3">

<label>

Previous Medical History

</label>

<textarea
id="medicalHistory"
class="form-control"
rows="3"
placeholder="Diabetes, BP, Surgery, etc."></textarea>

</div>

<!-- Current Medications -->

<div class="col-12 mb-3">

<label>

Current Medications

</label>

<textarea
id="medications"
class="form-control"
rows="3"
placeholder="Mention medicines if any"></textarea>

</div>

<!-- Allergies -->

<div class="col-12 mb-3">

<label>

Allergies

</label>

<textarea
id="allergies"
class="form-control"
rows="3"
placeholder="Any medicine or food allergies"></textarea>

</div>

<!-- Emergency -->

<div class="col-md-6 mb-4">

<label class="mb-3">

Emergency Case?

</label>

<div>

<div class="form-check form-check-inline">

<input
class="form-check-input"
type="radio"
name="emergency"
id="yes"
value="Yes">

<label class="form-check-label">

Yes

</label>

</div>

<div class="form-check form-check-inline">

<input
class="form-check-input"
type="radio"
name="emergency"
id="no"
value="No"
checked>

<label class="form-check-label">

No

</label>

</div>

</div>

</div>

<!-- Additional Notes -->

<div class="col-12 mb-4">

<label>

Additional Notes

</label>

<textarea
id="notes"
class="form-control"
rows="3"
placeholder="Anything you want the doctor to know..."></textarea>

</div>

</div>

<div class="text-center mt-3">

<button
type="submit"
class="btn btn-primary px-5">

<i class="bi bi-calendar-check"></i>

Book Appointment

</button>

<button
type="reset"
class="btn btn-secondary px-5 ms-2">

<i class="bi bi-arrow-clockwise"></i>

Reset

</button>

</div>

</form>

</div>

</div>

<script src="../js/appointment.js"></script>

</body>

</html>
