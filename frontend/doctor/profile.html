<!DOCTYPE html>

<title>Doctor Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fc;
}

/* Sidebar */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#0d6efd;
padding-top:20px;
}

.sidebar h3{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,.2);
}

.sidebar i{
margin-right:10px;
}

/* Main */

.main{
margin-left:250px;
padding:30px;
}

/* Topbar */

.topbar{
background:white;
padding:18px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 12px rgba(0,0,0,.08);
margin-bottom:30px;
}

/* Card */

.profile-card{
background:white;
border:none;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
padding:35px;
}

.profile-img{
width:150px;
height:150px;
border-radius:50%;
border:5px solid #0d6efd;
object-fit:cover;
}

.info p{
font-size:16px;
margin-bottom:15px;
}

.info i{
color:#0d6efd;
margin-right:10px;
}

.btn{
border-radius:8px;
padding:10px 20px;
}

</style>

</head>
