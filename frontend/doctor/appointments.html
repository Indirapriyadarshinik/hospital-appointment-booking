<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doctor Appointments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fc;
}

/* Sidebar */

.sidebar{
position:fixed;
width:250px;
height:100%;
background:#0d6efd;
padding-top:20px;
}

.sidebar h3{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,.2);
}

.sidebar i{
margin-right:10px;
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
background:white;
padding:18px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:30px;
}

.card-box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table th{
background:#0d6efd;
color:white;
}

.action-btn{
margin:2px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3><i class="bi bi-hospital"></i> MedCare</h3>

<a href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>

<a href="#"><i class="bi bi-calendar-check"></i>Appointments</a>

<a href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>

<a href="../login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>

</div>

<div class="main">

<div class="topbar">

<h4>Appointments</h4>

<div>
<i class="bi bi-person-circle"></i>
Dr. Rahul Sharma
</div>

</div>

<div class="card-box">

<div class="row mb-4">

<div class="col-md-6">

<input type="text" class="form-control" placeholder="Search Patient...">

</div>

<div class="col-md-3">

<select class="form-select">

<option>All Status</option>
<option>Pending</option>
<option>Confirmed</option>
<option>Completed</option>
<option>Rejected</option>

</select>

</div>

<div class="col-md-3">

<button class="btn btn-primary w-100">
Search
</button>

</div>

</div>

<table class="table table-hover">

<thead>

<tr>

<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>Chinnu</td>

<td>15 Jul 2026</td>

<td>10:00 AM</td>

<td>Fever</td>

<td>
<span class="badge bg-warning text-dark">
Pending
</span>
</td>

<td>

<a href="patient-details.html" class="btn btn-info btn-sm action-btn">
View
</a>

<button class="btn btn-success btn-sm action-btn">
Accept
</button>

<button class="btn btn-danger btn-sm action-btn">
Reject
</button>

</td>

</tr>

<tr>

<td>Ravi Kumar</td>

<td>15 Jul 2026</td>

<td>11:30 AM</td>

<td>Heart Checkup</td>

<td>

<span class="badge bg-primary">

Confirmed

</span>

</td>

<td>

<a href="patient-details.html" class="btn btn-info btn-sm action-btn">

View

</a>

<button class="btn btn-success btn-sm action-btn">

Complete

</button>

</td>

</tr>

<tr>

<td>Priya</td>

<td>16 Jul 2026</td>

<td>12:00 PM</td>

<td>Dental Pain</td>

<td>

<span class="badge bg-success">

Completed

</span>

</td>

<td>

<a href="patient-details.html" class="btn btn-secondary btn-sm">

Details

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>

</html>
