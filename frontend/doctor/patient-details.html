<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f7fc;
        }

        /* Sidebar */

        .sidebar {
            position: fixed;
            width: 250px;
            height: 100vh;
            background: #0d6efd;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, .2);
        }

        .sidebar i {
            margin-right: 10px;
        }

        /* Main */

        .main {
            margin-left: 250px;
            padding: 30px;
        }

        /* Topbar */

        .topbar {
            background: white;
            padding: 18px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            margin-bottom: 30px;
        }

        /* Cards */

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .08);
        }

        .patient-icon {
            font-size: 90px;
            color: #0d6efd;
        }

        .info p {
            margin-bottom: 14px;
            font-size: 15px;
        }

        .info i {
            color: #0d6efd;
            margin-right: 10px;
        }

        .section-title {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 20px;
        }

        textarea {
            resize: none;
        }

        .btn {
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h3>
            <i class="bi bi-hospital"></i>
            MedCare
        </h3>

        <a href="dashboard.html">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="appointments.html">
            <i class="bi bi-calendar-check"></i>
            Appointments
        </a>

        <a href="profile.html">
            <i class="bi bi-person-circle"></i>
            My Profile
        </a>

        <a href="../login.html">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="topbar">

            <h4>Patient Details</h4>

            <div>
                <i class="bi bi-person-circle"></i>
                Dr. Rahul Sharma
            </div>

        </div>

        <div class="row">

            <!-- Left Card -->

            <div class="col-lg-4">

                <div class="card p-4 text-center">

                    <i class="bi bi-person-circle patient-icon"></i>

                    <h3 class="mt-3">Chinnu</h3>

                    <p class="text-muted">
                        Patient ID : P101
                    </p>

                    <hr>

                    <div class="info text-start">

                        <p>
                            <i class="bi bi-person-fill"></i>
                            <strong>Age :</strong> 22 Years
                        </p>

                        <p>
                            <i class="bi bi-gender-ambiguous"></i>
                            <strong>Gender :</strong> Female
                        </p>

                        <p>
                            <i class="bi bi-telephone-fill"></i>
                            <strong>Phone :</strong> +91 9876543210
                        </p>

                        <p>
                            <i class="bi bi-envelope-fill"></i>
                            <strong>Email :</strong> chinnu@gmail.com
                        </p>

                        <p>
                            <i class="bi bi-clipboard2-pulse-fill"></i>
                            <strong>Reason :</strong> General Checkup
                        </p>

                    </div>

                </div>

            </div>

            <!-- Right Card -->

            <div class="col-lg-8">

                <div class="card p-4">

                    <h4 class="section-title">

                        <i class="bi bi-calendar-check-fill"></i>

                        Appointment Information

                    </h4>                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="fw-semibold">
                                <i class="bi bi-calendar-event"></i>
                                Appointment Date
                            </label>

                            <input type="text"
                                   class="form-control"
                                   value="15 July 2026"
                                   readonly>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="fw-semibold">
                                <i class="bi bi-clock-fill"></i>
                                Appointment Time
                            </label>

                            <input type="text"
                                   class="form-control"
                                   value="10:00 AM"
                                   readonly>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="fw-semibold">
                            <i class="bi bi-file-medical-fill"></i>
                            Symptoms
                        </label>

                        <textarea class="form-control"
                                  rows="3"
                                  readonly>Fever, Headache and Body Pain</textarea>

                    </div>

                    <div class="mb-3">

                        <label class="fw-semibold">
                            <i class="bi bi-journal-medical"></i>
                            Doctor Notes
                        </label>

                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Enter diagnosis or prescription..."></textarea>

                    </div>

                    <div class="mb-4">

                        <label class="fw-semibold">
                            <i class="bi bi-arrow-repeat"></i>
                            Appointment Status
                        </label>

                        <select class="form-select">

                            <option selected>Pending</option>
                            <option>Accepted</option>
                            <option>Rejected</option>
                            <option>Completed</option>

                        </select>

                    </div>

                    <div class="d-flex justify-content-end gap-3 flex-wrap">

                        <button class="btn btn-success">

                            <i class="bi bi-check-circle-fill"></i>

                            Accept

                        </button>

                        <button class="btn btn-danger">

                            <i class="bi bi-x-circle-fill"></i>

                            Reject

                        </button>

                        <button class="btn btn-primary">

                            <i class="bi bi-clipboard2-check-fill"></i>

                            Mark Completed

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
