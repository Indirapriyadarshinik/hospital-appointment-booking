<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef5ff;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#198754;
padding-top:25px;
}

.sidebar h3{
color:white;
text-align:center;
margin-bottom:35px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:rgba(255,255,255,.2);
}

.sidebar i{
margin-right:10px;
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
background:white;
padding:18px 25px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table thead{
background:#198754;
color:white;
}

.table td,
.table th{
vertical-align:middle;
text-align:center;
}

.btn-success,
.btn-danger{
padding:6px 14px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>

<i class="bi bi-hospital-fill"></i>

Doctor Panel

</h3>
<a href="profile.html" class="active">

<i class="bi bi-speedometer2"></i>

Profile

</a>

<a href="#" class="active">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

<a href="#" class="active">

<i class="bi bi-calendar-check"></i>

Appointments

</a>

<a href="../login.html">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</div>

<div class="main">

<div class="topbar">

<h4>

Doctor Dashboard

</h4>

<div>

<i class="bi bi-person-circle"></i>

Welcome,

<b id="doctorName">

Doctor

</b>

</div>

</div>

<div class="card p-4">

<h3 class="mb-4 text-success">

<i class="bi bi-calendar2-check-fill"></i>

Pending Appointments

</h3>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Appointment ID</th>

<th>Patient ID</th>

<th>Department</th>

<th>Date</th>

<th>Time</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="appointmentTable">
    <!-- JavaScript will load appointments here -->

</tbody>

</table>

</div>

</div>

</div>

<script src="../js/doctorDashboard.js"></script>

</body>

</html>
