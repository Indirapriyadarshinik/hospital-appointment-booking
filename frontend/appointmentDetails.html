<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
background:#eef5ff;
font-family:'Poppins',sans-serif;
}

.card{
margin-top:40px;
border:none;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card-header{
background:#0d6efd;
color:white;
font-size:22px;
font-weight:600;
}

.info{
font-size:18px;
margin-bottom:18px;
}

.label{
font-weight:600;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

Appointment Details

</div>

<div class="card-body">

<p class="info">

<span class="label">Appointment ID:</span>

<span id="appointmentId"></span>

</p>

<p class="info">

<span class="label">Doctor:</span>

<span id="doctor"></span>

</p>

<p class="info">

<span class="label">Department:</span>

<span id="department"></span>

</p>

<p class="info">

<span class="label">Status:</span>

<span id="status"></span>

</p>

<p class="info">

<span class="label">Diagnosis:</span>

<span id="diagnosis"></span>

</p>

<p class="info">

<span class="label">Prescription:</span>

<span id="prescription"></span>

</p>

<p class="info">

<span class="label">Advice:</span>

<span id="advice"></span>

</p>
<div class="text-center mt-4">

<a href="appointments.html" class="btn btn-primary">

<i class="bi bi-arrow-left"></i>

Back to My Appointments

</a>

</div>

</div>

</div>

</div>

<script src="js/appointmentDetails.js"></script>

</body>

</html>
