<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Appointment Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f8fbff;
        }

        .navbar{
            background:white;
        }

        .navbar-brand{
            font-size:30px;
            font-weight:bold;
            color:#0d6efd !important;
        }

        .hero{
            min-height:90vh;
            display:flex;
            align-items:center;
        }

        h1{
            font-size:70px;
            font-weight:800;
            color:#0b3d91;
            line-height:1.1;
        }

        p{
            font-size:20px;
            color:#666;
            margin-top:25px;
        }

        .login-btn{
            margin-top:35px;
            padding:14px 45px;
            border-radius:50px;
            font-size:20px;
        }

        .image-box{
            position:relative;
            text-align:center;
        }

        .image-box img{
            width:100%;
            max-width:500px;
        }

        .card-box{
            position:absolute;
            background:white;
            padding:12px 20px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
            font-weight:bold;
            color:#198754;
        }

        .box1{
            top:20px;
            left:0;
        }

        .box2{
            top:10px;
            right:0;
        }

        .box3{
            left:0;
            bottom:150px;
        }

        .box4{
            right:0;
            bottom:70px;
        }

        @media(max-width:992px){

            h1{
                font-size:45px;
                text-align:center;
            }

            p{
                text-align:center;
            }

            .login-btn{
                display:block;
                margin:auto;
                margin-top:30px;
            }

            .image-box{
                margin-top:50px;
            }

        }

    </style>

</head>

<body>

<nav class="navbar shadow-sm">

    <div class="container">

        <a class="navbar-brand" href="#">
            🏥 Hospital Appointment
        </a>

    </div>

</nav>

<section class="hero">

<div class="container">

<div class="row align-items-center">

<div class="col-lg-6">

<h1>
Hospital
<br>
Appointment
<br>
Scheduling
<br>
Software
</h1>

<p>
Book appointments with doctors easily,
manage schedules efficiently,
and provide a better healthcare experience.
</p>

<a href="login.html" class="btn btn-primary btn-lg login-btn">
Login
</a>

</div>

<div class="col-lg-6">

<div class="image-box">

<img src="images/doctor.png" alt="Doctor">

<div class="card-box box1">
📅 Scheduling
</div>

<div class="card-box box2">
⭐ Patient Experience
</div>

<div class="card-box box3">
📖 Appointment Booking
</div>

<div class="card-box box4">
📧 SMS / Email Reminders
</div>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
