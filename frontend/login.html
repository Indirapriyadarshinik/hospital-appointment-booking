<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#eef5ff;
        }

        .container-fluid{
            height:100vh;
        }

        .left{
            background:linear-gradient(135deg,#0d6efd,#3ea6ff);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            padding:40px;
        }

        .left i{
            font-size:90px;
            margin-bottom:20px;
        }

        .left h1{
            font-weight:700;
        }

        .left p{
            text-align:center;
            margin-top:15px;
            font-size:18px;
            max-width:420px;
        }

        .right{
            display:flex;
            justify-content:center;
            align-items:center;
            background:white;
        }

        .login-card{
            width:420px;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        .login-card h2{
            font-weight:700;
            color:#0d6efd;
        }

        .form-control,
        .form-select{
            height:50px;
            border-radius:10px;
        }

        .btn-login{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:600;
        }

        .register{
            text-align:center;
            margin-top:20px;
        }

        a{
            text-decoration:none;
        }

        @media(max-width:768px){

            .left{
                display:none;
            }

            .right{
                width:100%;
            }

            .login-card{
                width:90%;
            }

        }
    </style>

</head>

<body>

<div class="container-fluid">

<div class="row h-100">

<!-- Left -->

<div class="col-lg-6 left">

<i class="bi bi-hospital-fill"></i>

<h1>Hospital Appointment Booking</h1>

<p>
Book appointments online with trusted doctors anytime, anywhere.
</p>

</div>

<!-- Right -->

<div class="col-lg-6 right">

<div class="login-card">

<h2 class="text-center mb-4">Login</h2>

<form id="loginForm">

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="mb-4">

<label>Login As</label>

<select
id="role"
class="form-select"
required>

<option value="" selected disabled>Select Role</option>

<option value="Patient">Patient</option>

<option value="Doctor">Doctor</option>

<option value="Admin">Admin</option>

</select>

</div>

<button
type="submit"
class="btn btn-primary w-100 btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</form>

<div class="register">

New Patient?

<a href="register.html">Register Here</a>

</div>

</div>

</div>

</div>

</div>

<script src="js/login.js"></script>

</body>

</html>
