<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Appointments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef5ff;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#0d6efd;
padding-top:25px;
}

.sidebar h3{
color:#fff;
text-align:center;
margin-bottom:35px;
font-weight:600;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:rgba(255,255,255,.18);
}

.sidebar i{
margin-right:10px;
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
background:white;
padding:18px 25px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card h3{
color:#0d6efd;
font-weight:700;
}

.table thead{
background:#0d6efd;
color:white;
}

.table td,
.table th{
vertical-align:middle;
text-align:center;
}

.badge{
font-size:14px;
padding:8px 14px;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.main{
margin-left:0;
padding:15px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h3>

<i class="bi bi-hospital-fill"></i>

MedCare

</h3>

<a href="dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

<a href="appointment.html">

<i class="bi bi-calendar-plus"></i>

Book Appointment

</a>

<a href="appointments.html" class="active">

<i class="bi bi-calendar-check"></i>

My Appointments

</a>

<a href="profile.html">

<i class="bi bi-person-circle"></i>

Profile

</a>

<a href="../login.html">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h4>

My Appointments

</h4>

<div>

<i class="bi bi-person-circle"></i>

Welcome,

<b id="patientName">

Patient

</b>

</div>

</div>

<div class="card p-4">

<h3 class="mb-4">

<i class="bi bi-calendar-check-fill"></i>

Appointment History

</h3>

<div class="table-responsive">

<table class="table table-hover table-bordered">

<thead>

<tr>

<th>Appointment ID</th>

<th>Doctor</th>

<th>Department</th>

<th>Date</th>

<th>Time</th>

<th>Status</th>

</tr>

</thead>

<tbody id="appointmentTable">

<!-- JavaScript will insert rows here -->

</tbody>

</table>

</div>

</div>

</div>
</body>
<script src="js/appointments.js"></script>

</html>
